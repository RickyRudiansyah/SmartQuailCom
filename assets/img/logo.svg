<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <!-- Background circle -->
  <circle cx="80" cy="80" r="76" fill="url(#bg-grad)" stroke="url(#ring-grad)" stroke-width="1.5"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="160" y2="160">
      <stop stop-color="#0D9488"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="160" y2="160">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="wifi-grad" x1="32" y1="32" x2="64" y2="64">
      <stop stop-color="#CCFBF1"/>
      <stop offset="1" stop-color="#99F6E4"/>
    </linearGradient>
  </defs>

  <!-- Quail silhouette (stylized) -->
  <g transform="translate(52, 36)">
    <!-- Body -->
    <ellipse cx="28" cy="50" rx="24" ry="18" fill="#CCFBF1" opacity="0.95"/>
    <!-- Head -->
    <circle cx="18" cy="34" r="13" fill="#CCFBF1" opacity="0.95"/>
    <!-- Beak -->
    <polygon points="5,32 -2,30 5,35" fill="#FDE68A"/>
    <!-- Eye -->
    <circle cx="14" cy="32" r="2" fill="#0F172A"/>
    <!-- Wing -->
    <path d="M32,40 Q44,28 52,36 Q48,44 36,48 Z" fill="#99F6E4"/>
    <!-- Tail feathers -->
    <path d="M50,46 Q58,40 56,48" fill="none" stroke="#CCFBF1" stroke-width="2" stroke-linecap="round"/>
    <path d="M48,50 Q58,46 55,53" fill="none" stroke="#CCFBF1" stroke-width="2" stroke-linecap="round"/>
    <path d="M46,54 Q54,50 52,56" fill="none" stroke="#CCFBF1" stroke-width="2" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="22" y1="68" x2="20" y2="78" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="68" x2="36" y2="78" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wi-Fi / IoT Signal Arcs -->
  <g transform="translate(88, 62)" stroke="url(#wifi-grad)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M-28,4 Q0,-28 28,4" opacity="0.5"/>
    <path d="M-20,10 Q0,-16 20,10" opacity="0.7"/>
    <path d="M-12,16 Q0,-4 12,16"/>
  </g>

  <!-- SmartQuail text -->
  <text x="80" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="14" fill="#CCFBF1" letter-spacing="1.5">SMARTQUAIL</text>
</svg>
