<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" fill="none">
  <defs>
    <filter id="phone-shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#00000015"/>
    </filter>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#0D9488"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- Phone Frame -->
  <g filter="url(#phone-shadow)">
    <rect x="116" y="20" width="188" height="360" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <!-- Notch -->
  <rect x="176" y="28" width="68" height="4" rx="2" fill="#E2E8F0"/>

  <!-- Status Bar -->
  <text x="130" y="44" font-family="Inter, sans-serif" font-weight="600" font-size="8" fill="#1E293B">9:41</text>
  <rect x="268" y="42" width="14" height="8" rx="2" fill="#10B981" opacity="0.6"/>
  <rect x="285" y="40" width="6" height="10" rx="1.5" fill="#1E293B"/>

  <!-- Header -->
  <rect x="116" y="52" width="188" height="40" fill="url(#header-grad)"/>
  <text x="210" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="white">SmartQuail</text>

  <!-- Dashboard Title -->
  <text x="130" y="108" font-family="Inter, sans-serif" font-weight="700" font-size="13" fill="#1E293B">Dashboard</text>
  <text x="130" y="122" font-family="Inter, sans-serif" font-weight="400" font-size="9" fill="#94A3B8">Kandang Puyuh A-12</text>

  <!-- Online Badge -->
  <rect x="250" y="108" width="44" height="16" rx="8" fill="#DCFCE7"/>
  <circle cx="260" cy="116" r="3" fill="#22C55E"/>
  <text x="267" y="120" font-family="Inter, sans-serif" font-weight="600" font-size="7" fill="#166534">Online</text>

  <!-- KPI Cards -->
  <!-- Temp -->
  <rect x="128" y="134" width="78" height="62" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="142" y="152" font-family="Inter, sans-serif" font-weight="500" font-size="8" fill="#64748B">Suhu</text>
  <text x="142" y="172" font-family="Inter, sans-serif" font-weight="700" font-size="20" fill="#0F172A">28.5°</text>
  <circle cx="178" cy="178" r="3" fill="#FF9500"/>

  <!-- Humidity -->
  <rect x="214" y="134" width="78" height="62" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="228" y="152" font-family="Inter, sans-serif" font-weight="500" font-size="8" fill="#64748B">Kelembaban</text>
  <text x="228" y="172" font-family="Inter, sans-serif" font-weight="700" font-size="20" fill="#0F172A">72%</text>
  <circle cx="264" cy="178" r="3" fill="#34C759"/>

  <!-- Safety row -->
  <text x="130" y="218" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#1E293B">Status Lingkungan</text>

  <!-- THI Gauge -->
  <rect x="128" y="228" width="164" height="70" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="142" y="246" font-family="Inter, sans-serif" font-weight="500" font-size="8" fill="#64748B">THI Index</text>

  <!-- Gauge arc -->
  <path d="M150,278 A52,52 0 0,1 274,278" fill="none" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round"/>
  <path d="M150,278 A52,52 0 0,1 244,264" fill="none" stroke="#0D9488" stroke-width="10" stroke-linecap="round"/>

  <text x="210" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#0D9488">74.1</text>

  <!-- TODO: Add ammonia KPI card below gauge -->

  <!-- Relays -->
  <text x="130" y="320" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#1E293B">Perangkat</text>
  <rect x="128" y="330" width="78" height="30" rx="8" fill="#F1F5F9"/>
  <text x="148" y="350" font-family="Inter, sans-serif" font-weight="500" font-size="9" fill="#64748B">Kipas</text>
  <rect x="174" y="336" width="24" height="14" rx="7" fill="#E2E8F0"/>
  <circle cx="192" cy="343" r="5" fill="#94A3B8"/>

  <rect x="214" y="330" width="78" height="30" rx="8" fill="#F1F5F9"/>
  <text x="234" y="350" font-family="Inter, sans-serif" font-weight="500" font-size="9" fill="#64748B">Pompa</text>
  <rect x="260" y="336" width="24" height="14" rx="7" fill="#E2E8F0"/>
  <circle cx="278" cy="343" r="5" fill="#94A3B8"/>

  <!-- Bottom nav -->
  <rect x="116" y="370" width="188" height="10" fill="white"/>
  <rect x="172" y="368" width="76" height="6" rx="3" fill="#E2E8F0"/>

  <!-- 3D tilt shadow-hint -->
  <path d="M304,40 L304,380" stroke="#E2E8F0" stroke-width="1" opacity="0.3"/>
</svg>
